version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    labels:
      - dependencies

  - package-ecosystem: npm
    directory: /starter/app
    schedule:
      interval: monthly
    labels:
      - dependencies
    groups:
      routine-updates:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - minor
          - patch
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major
