<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-label="App-native explainer showcase card">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#fff"/><stop offset="1" stop-color="#f1f5fc"/></linearGradient>
    <filter id="sh"><feDropShadow dx="0" dy="20" stdDeviation="18" flood-color="#0b1f33" flood-opacity=".14"/></filter>
    <style>.ink{fill:#0b1f33}.muted{fill:#5b708a}.accent{fill:#1d4fd8}.teal{fill:#0f9f83}.small{font:800 13px Inter,Segoe UI,Arial;letter-spacing:.12em}.title{font:850 36px Inter,Segoe UI,Arial}.body{font:500 17px Inter,Segoe UI,Arial}</style>
  </defs>
  <rect width="980" height="560" rx="24" fill="url(#bg)"/>
  <circle cx="850" cy="80" r="150" fill="#1d4fd8" opacity=".06"/>
  <text class="small accent" x="54" y="68">SHOWCASE / REAL UI</text>
  <text class="title ink" x="54" y="116">App-native explainer</text>
  <text class="body muted" x="54" y="150">The product interface carries the proof.</text>
  <g transform="translate(54 194)" filter="url(#sh)">
    <rect width="872" height="286" rx="18" fill="#fff" stroke="#d9e2f2"/>
    <rect width="146" height="286" rx="18" fill="#0b1f33"/>
    <text x="22" y="40" fill="#dce8f7" font-family="Inter,Segoe UI,Arial" font-size="16" font-weight="800">Acme</text>
    <rect x="18" y="72" width="110" height="34" rx="8" fill="#1d4fd8" opacity=".33"/>
    <g transform="translate(180 46)">
      <text x="0" y="0" class="small muted">LEADER READINESS</text>
      <g transform="translate(0 34)">
        <rect width="172" height="112" rx="12" fill="#fff" stroke="#d9e2f2"/>
        <text x="18" y="34" class="small muted">GAP A</text><text x="18" y="78" fill="#0b1f33" font-size="34" font-family="Inter,Segoe UI,Arial" font-weight="850">72%</text>
      </g>
      <g transform="translate(196 34)">
        <rect width="172" height="112" rx="12" fill="#fff" stroke="#1d4fd8" stroke-width="4"/>
        <text x="18" y="34" class="small muted">ACTIVE GAP</text><text x="18" y="78" fill="#0b1f33" font-size="34" font-family="Inter,Segoe UI,Arial" font-weight="850">64%</text>
      </g>
      <g transform="translate(392 34)">
        <rect width="172" height="112" rx="12" fill="#fff" stroke="#d9e2f2"/>
        <text x="18" y="34" class="small muted">HEALTHY</text><text x="18" y="78" fill="#0b1f33" font-size="34" font-family="Inter,Segoe UI,Arial" font-weight="850">88%</text>
      </g>
      <rect x="0" y="176" width="564" height="58" rx="12" fill="#f9fbff" stroke="#d9e2f2"/>
      <circle cx="32" cy="205" r="8" fill="#1d4fd8"/>
      <text x="54" y="211" class="body ink">Evidence drawer opens on the spoken word.</text>
    </g>
  </g>
</svg>

