<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-label="Guided recommendation proof showcase card">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#fff"/><stop offset="1" stop-color="#f1f5fc"/></linearGradient>
    <filter id="sh"><feDropShadow dx="0" dy="20" stdDeviation="18" flood-color="#0b1f33" flood-opacity=".14"/></filter>
    <style>.ink{fill:#0b1f33}.muted{fill:#5b708a}.accent{fill:#1d4fd8}.teal{fill:#0f9f83}.small{font:800 13px Inter,Segoe UI,Arial;letter-spacing:.12em}.title{font:850 36px Inter,Segoe UI,Arial}.body{font:500 17px Inter,Segoe UI,Arial}</style>
  </defs>
  <rect width="980" height="560" rx="24" fill="url(#bg)"/>
  <circle cx="760" cy="126" r="166" fill="#1d4fd8" opacity=".055"/>
  <text class="small accent" x="54" y="68">SHOWCASE / RECOMMENDATION</text>
  <text class="title ink" x="54" y="116">Guided recommendation proof</text>
  <text class="body muted" x="54" y="150">The product explains from evidence.</text>
  <g transform="translate(74 200)" filter="url(#sh)">
    <rect width="430" height="234" rx="18" fill="#fff" stroke="#d9e2f2"/>
    <text x="28" y="42" class="small muted">WORKFLOW ITEM</text>
    <rect x="28" y="66" width="374" height="42" rx="10" fill="#f9fbff" stroke="#d9e2f2"/>
    <rect x="28" y="126" width="178" height="54" rx="10" fill="#fff" stroke="#d9e2f2"/>
    <rect x="224" y="126" width="178" height="54" rx="10" fill="#fff" stroke="#d9e2f2"/>
    <circle cx="52" cy="205" r="8" fill="#1d4fd8"/>
    <text x="72" y="211" class="body muted">Real context enters first.</text>
  </g>
  <g transform="translate(540 172)" filter="url(#sh)">
    <rect width="340" height="288" rx="18" fill="#fff" stroke="#1d4fd8" stroke-width="4"/>
    <text x="28" y="42" class="small accent">WHY THIS ACTION</text>
    <text x="28" y="84" class="body ink">Recommended because the</text>
    <text x="28" y="112" class="body ink">gap is active and evidence</text>
    <text x="28" y="140" class="body ink">is attached.</text>
    <rect x="28" y="176" width="92" height="30" rx="15" fill="#e8efff"/>
    <text x="48" y="196" fill="#1d4fd8" font-family="Inter,Segoe UI,Arial" font-size="13" font-weight="850">role</text>
    <rect x="132" y="176" width="102" height="30" rx="15" fill="#e8efff"/>
    <text x="154" y="196" fill="#1d4fd8" font-family="Inter,Segoe UI,Arial" font-size="13" font-weight="850">review</text>
    <rect x="28" y="226" width="118" height="32" rx="16" fill="#e5f7f2"/>
    <text x="52" y="248" fill="#0f9f83" font-family="Inter,Segoe UI,Arial" font-size="13" font-weight="850">accepted</text>
  </g>
</svg>
