    <style>.ink{fill:#0b1f33}.muted{fill:#5b708a}.accent{fill:#1d4fd8}.small{font:800 13px Inter,Segoe UI,Arial;letter-spacing:.12em}.title{font:850 36px Inter,Segoe UI,Arial}.body{font:500 17px Inter,Segoe UI,Arial}</style>
